<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATAMURA — Чеклист тестирования ботов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ===== THEMES ===== */
body.theme-white {
  --bg: #F5F5F5;
  --surface: #FFFFFF;
  --surface2: #EFEFEF;
  --border: rgba(0,0,0,0.10);
  --border-med: rgba(0,0,0,0.16);
  --text: #1A1A18;
  --text-sec: #6B6B67;
  --text-ter: #ABABAB;
  --accent: #2563EB;
  --accent-light: #EFF6FF;
  --accent-dark: #1D4ED8;
  --accent-text: #1D4ED8;
  --sidebar-bg: #FFFFFF;
  --topbar-bg: #FFFFFF;
  --card-border-accent: #2563EB;
}
body.theme-beige {
  --bg: #F0EBE1;
  --surface: #FAF7F2;
  --surface2: #EDE7DB;
  --border: rgba(120,90,50,0.12);
  --border-med: rgba(120,90,50,0.20);
  --text: #2C2416;
  --text-sec: #7A6A55;
  --text-ter: #B8A898;
  --accent: #C17B3A;
  --accent-light: #FDF3E8;
  --accent-dark: #9A5E25;
  --accent-text: #9A5E25;
  --sidebar-bg: #EDE7DB;
  --topbar-bg: #FAF7F2;
  --card-border-accent: #C17B3A;
}
body.theme-black {
  --bg: #111111;
  --surface: #1C1C1C;
  --surface2: #282828;
  --border: rgba(255,255,255,0.08);
  --border-med: rgba(255,255,255,0.14);
  --text: #F0F0F0;
  --text-sec: #999999;
  --text-ter: #555555;
  --accent: #4ADE80;
  --accent-light: rgba(74,222,128,0.12);
  --accent-dark: #22C55E;
  --accent-text: #4ADE80;
  --sidebar-bg: #161616;
  --topbar-bg: #1C1C1C;
  --card-border-accent: #4ADE80;
}
body.theme-blue {
  --bg: #E8F4FD;
  --surface: #FFFFFF;
  --surface2: #D6EDFB;
  --border: rgba(37,99,235,0.12);
  --border-med: rgba(37,99,235,0.22);
  --text: #0F2850;
  --text-sec: #3B6080;
  --text-ter: #8BB4CC;
  --accent: #0EA5E9;
  --accent-light: #E0F2FE;
  --accent-dark: #0369A1;
  --accent-text: #0369A1;
  --sidebar-bg: #D6EDFB;
  --topbar-bg: #FFFFFF;
  --card-border-accent: #0EA5E9;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  transition: background 0.25s, color 0.25s;
}

.layout { display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: 248px;
  background: var(--sidebar-bg);
  border-right: 2px solid var(--border-med);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 100; overflow-y: auto;
  transition: background 0.25s, border-color 0.25s;
}

.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 18px 16px;
  border-bottom: 2px solid var(--border-med);
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 17px; flex-shrink: 0;
}
.logo-name { font-size: 15px; font-weight: 600; color: var(--text); }
.logo-tagline { font-size: 11px; color: var(--text-sec); }

.sidebar-section { padding: 14px 12px 6px; }
.sidebar-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.09em; color: var(--text-ter);
  text-transform: uppercase; padding: 0 6px; margin-bottom: 5px;
}

.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px;
  border-radius: 7px; cursor: pointer;
  color: var(--text-sec); font-size: 13px;
  transition: all 0.12s;
  border: none; background: none; width: 100%; text-align: left;
  font-family: inherit;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent-text); font-weight: 500; border-left: 3px solid var(--accent); padding-left: 7px; }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.nav-badge { margin-left: auto; font-size: 11px; background: var(--surface2); color: var(--text-sec); padding: 1px 7px; border-radius: 10px; }
.nav-item.active .nav-badge { background: var(--accent-light); color: var(--accent-text); }

/* THEME SWITCHER */
.theme-section { padding: 14px 12px 8px; }
.theme-btns { display: flex; gap: 6px; padding: 0 6px; }
.theme-dot {
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.theme-dot:hover { transform: scale(1.15); }
.theme-dot.active { border-color: var(--accent); transform: scale(1.15); }
.theme-dot-white { background: #FFFFFF; box-shadow: 0 0 0 1px #ccc; }
.theme-dot-beige { background: #C17B3A; }
.theme-dot-black { background: #1C1C1C; box-shadow: 0 0 0 1px #555; }
.theme-dot-blue { background: #0EA5E9; }

.sidebar-footer { margin-top: auto; padding: 14px 12px; border-top: 2px solid var(--border-med); }
.export-btn {
  width: 100%; padding: 9px 12px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 7px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  display: flex; align-items: center; gap: 7px; justify-content: center;
  transition: opacity 0.15s; font-family: inherit;
}
.export-btn:hover { opacity: 0.88; }

/* MAIN */
.main { margin-left: 248px; flex: 1; display: flex; flex-direction: column; }

.topbar {
  background: var(--topbar-bg);
  border-bottom: 2px solid var(--border-med);
  padding: 14px 28px;
  display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 50;
  transition: background 0.25s;
}
.topbar-title { font-size: 16px; font-weight: 600; flex: 1; }
.topbar-sub { font-size: 12px; color: var(--text-sec); margin-top: 1px; }

.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-ter); pointer-events:none; }
.search-input {
  padding: 8px 12px 8px 32px;
  border: 1.5px solid var(--border-med);
  border-radius: 20px; font-size: 13px;
  background: var(--surface2); color: var(--text); width: 210px;
  font-family: inherit; transition: all 0.15s;
}
.search-input:focus { outline: none; border-color: var(--accent); background: var(--surface); }

/* STATS */
.stats-bar {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; padding: 20px 28px 14px;
}
.stat-card {
  background: var(--surface);
  border: 2px solid var(--border-med);
  border-radius: 12px; padding: 16px 18px;
  border-top: 4px solid var(--accent);
  transition: background 0.25s, border-color 0.25s;
}
.stat-label { font-size: 11px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 600; line-height: 1; color: var(--accent); }
.stat-value.neutral { color: var(--text); }
.stat-sub { font-size: 11px; color: var(--text-ter); margin-top: 4px; }

/* PROGRESS */
.progress-section { padding: 0 28px 14px; }
.progress-label { font-size: 12px; color: var(--text-sec); margin-bottom: 6px; display: flex; justify-content: space-between; }
.progress-global { background: var(--surface2); border-radius: 100px; height: 8px; overflow: hidden; border: 1px solid var(--border); }
.progress-global-fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width 0.4s; }

/* FILTERS */
.filters { display: flex; gap: 6px; padding: 0 28px 14px; flex-wrap: wrap; }
.filter-chip {
  padding: 5px 14px; border-radius: 20px;
  border: 1.5px solid var(--border-med);
  background: var(--surface); color: var(--text-sec);
  font-size: 12px; cursor: pointer; transition: all 0.12s;
  font-family: inherit;
}
.filter-chip:hover { border-color: var(--accent); color: var(--accent-text); }
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

/* BOT LIST */
.bot-list { padding: 0 28px 40px; display: flex; flex-direction: column; gap: 12px; }

.bot-card {
  background: var(--surface);
  border: 2px solid var(--border-med);
  border-radius: 12px; overflow: hidden;
  transition: box-shadow 0.15s, border-color 0.15s, background 0.25s;
}
.bot-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(0,0,0,0.09); }
.bot-card.done { border-left: 5px solid var(--accent); }
.bot-card.partial { border-left: 5px solid #F59E0B; }

.bot-header {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; cursor: pointer; user-select: none;
}
.bot-avatar {
  width: 42px; height: 42px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 600; flex-shrink: 0;
  border: 2px solid transparent;
}
.bot-info { flex: 1; min-width: 0; }
.bot-name { font-size: 14px; font-weight: 600; color: var(--text); }
.bot-meta { font-size: 12px; color: var(--text-sec); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bot-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
.badge-p0 { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
.badge-p1 { background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A; }
.badge-done { background: var(--accent-light); color: var(--accent-text); border: 1px solid var(--accent); }
.badge-partial { background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A; }
.badge-empty { background: var(--surface2); color: var(--text-ter); border: 1px solid var(--border); }

.chevron { width: 16px; height: 16px; color: var(--text-ter); transition: transform 0.2s; flex-shrink: 0; }
.chevron.open { transform: rotate(180deg); }

.prog-bar { height: 4px; background: var(--surface2); }
.prog-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

.bot-body { display: none; padding: 0 18px 18px; border-top: 2px solid var(--border-med); }
.bot-body.open { display: block; }

.questions-grid { display: flex; flex-direction: column; gap: 16px; padding-top: 18px; }

.q-item {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px; padding: 14px;
  transition: border-color 0.15s;
}
.q-item:focus-within { border-color: var(--accent); }

.q-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.q-label { font-size: 12px; font-weight: 500; color: var(--text-sec); display: flex; align-items: flex-start; gap: 7px; flex: 1; }
.q-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 600; flex-shrink: 0; margin-top: 0px;
}
.q-delete-btn {
  background: none; border: none; cursor: pointer; color: var(--text-ter);
  font-size: 12px; padding: 2px 6px; border-radius: 5px; transition: all 0.12s;
  font-family: inherit; flex-shrink: 0;
}
.q-delete-btn:hover { background: #FEE2E2; color: #991B1B; }

.q-input {
  width: 100%; padding: 9px 12px;
  border: 1.5px solid var(--border-med);
  border-radius: 8px; font-size: 13px; font-family: inherit;
  background: var(--surface); color: var(--text);
  resize: vertical; min-height: 72px; line-height: 1.55;
  transition: border-color 0.15s;
}
.q-input:focus { outline: none; border-color: var(--accent); }

/* ADD QUESTION INSIDE BOT */
.add-q-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
.add-q-input {
  flex: 1; padding: 8px 12px;
  border: 1.5px dashed var(--border-med);
  border-radius: 8px; font-size: 13px; font-family: inherit;
  background: var(--surface); color: var(--text);
}
.add-q-input:focus { outline: none; border-color: var(--accent); border-style: solid; }
.add-q-btn {
  padding: 8px 14px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: inherit; white-space: nowrap; transition: opacity 0.15s;
}
.add-q-btn:hover { opacity: 0.85; }

.bot-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 16px; padding-top: 14px; border-top: 2px solid var(--border-med);
}
.save-hint { font-size: 12px; color: var(--text-ter); }
.save-btn {
  display: flex; align-items: center; gap: 7px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  padding: 9px 22px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: opacity 0.15s;
}
.save-btn:hover { opacity: 0.88; }

/* ADD BOT SECTION */
.add-section { padding: 0 28px 12px; }
.add-toggle-btn {
  width: 100%; padding: 13px;
  border: 2px dashed var(--border-med);
  border-radius: 12px; background: transparent; color: var(--text-sec);
  font-size: 13px; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.15s;
}
.add-toggle-btn:hover { background: var(--accent-light); color: var(--accent-text); border-color: var(--accent); }

.add-form-wrap {
  background: var(--surface); border: 2px solid var(--border-med);
  border-radius: 12px; padding: 18px; margin-top: 10px; display: none;
}
.add-form-wrap.open { display: block; }
.add-form-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
.add-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.add-field label { font-size: 12px; color: var(--text-sec); display: block; margin-bottom: 4px; }
.add-field input, .add-field select {
  width: 100%; padding: 8px 10px;
  border: 1.5px solid var(--border-med); border-radius: 8px;
  font-size: 13px; font-family: inherit;
  background: var(--surface2); color: var(--text);
}
.add-field input:focus, .add-field select:focus { outline: none; border-color: var(--accent); }
.add-field.full { grid-column: span 2; }
.add-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.btn-cancel {
  padding: 8px 18px; border: 1.5px solid var(--border-med);
  border-radius: 8px; background: transparent;
  font-size: 13px; cursor: pointer; color: var(--text-sec); font-family: inherit;
}
.btn-cancel:hover { background: var(--surface2); }
.btn-confirm {
  padding: 8px 22px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
}

/* TOAST */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--text); color: var(--bg);
  padding: 11px 18px; border-radius: 10px;
  font-size: 13px; display: flex; align-items: center; gap: 8px;
  opacity: 0; transform: translateY(8px);
  transition: all 0.25s; pointer-events: none; z-index: 999;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

@media (max-width: 820px) {
  .sidebar { width: 56px; }
  .sidebar .logo-name, .sidebar .logo-tagline, .sidebar-label,
  .nav-item span, .nav-badge, .theme-section .sidebar-label,
  .sidebar-footer .export-btn span { display: none; }
  .main { margin-left: 56px; }
  .stats-bar { grid-template-columns: 1fr 1fr; }
  .topbar, .bot-list, .add-section, .filters, .stats-bar, .progress-section { padding-left: 16px; padding-right: 16px; }
}
</style>
</head>
<body class="theme-white">

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div>
      <div class="logo-name">ATAMURA</div>
      <div class="logo-tagline">Bot Checklist</div>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Навигация</div>
    <button class="nav-item active" data-filter="all" onclick="setFilter('all',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>Все боты</span><span class="nav-badge" id="cnt-all">15</span>
    </button>
    <button class="nav-item" data-filter="p0" onclick="setFilter('p0',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>Приоритет P0</span><span class="nav-badge" id="cnt-p0">10</span>
    </button>
    <button class="nav-item" data-filter="p1" onclick="setFilter('p1',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>Приоритет P1</span><span class="nav-badge" id="cnt-p1">5</span>
    </button>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Статус</div>
    <button class="nav-item" data-filter="done" onclick="setFilter('done',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span>Заполнены</span><span class="nav-badge" id="cnt-done">0</span>
    </button>
    <button class="nav-item" data-filter="partial" onclick="setFilter('partial',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Частично</span><span class="nav-badge" id="cnt-partial">0</span>
    </button>
    <button class="nav-item" data-filter="empty" onclick="setFilter('empty',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
      <span>Не заполнены</span><span class="nav-badge" id="cnt-empty">15</span>
    </button>
  </div>

  <div class="theme-section sidebar-section">
    <div class="sidebar-label">Тема</div>
    <div class="theme-btns" style="padding:4px 6px">
      <div class="theme-dot theme-dot-white active" title="Белая" onclick="setTheme('white',this)"></div>
      <div class="theme-dot theme-dot-beige" title="Бежевая" onclick="setTheme('beige',this)"></div>
      <div class="theme-dot theme-dot-black" title="Чёрная" onclick="setTheme('black',this)"></div>
      <div class="theme-dot theme-dot-blue" title="Голубая" onclick="setTheme('blue',this)"></div>
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="export-btn" onclick="exportReport()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>Скачать отчёт</span>
    </button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div style="flex:1">
      <div class="topbar-title">Чеклист тестирования ботов</div>
      <div class="topbar-sub">Заполните по каждому боту — данные сохраняются автоматически</div>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="search-input" id="search" placeholder="Поиск бота..." oninput="renderBots()">
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Всего ботов</div>
      <div class="stat-value neutral" id="s-total">15</div>
      <div class="stat-sub">в чеклисте</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Заполнены</div>
      <div class="stat-value" id="s-done">0</div>
      <div class="stat-sub">все вопросы</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">В процессе</div>
      <div class="stat-value" id="s-partial">0</div>
      <div class="stat-sub">частично</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Прогресс</div>
      <div class="stat-value" id="s-pct">0%</div>
      <div class="stat-sub">заполнено</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-label">
      <span>Общий прогресс</span>
      <span id="prog-text">0 из 15 ботов заполнены</span>
    </div>
    <div class="progress-global"><div class="progress-global-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="filters">
    <button class="filter-chip active" onclick="setFilter2('all',this)">Все</button>
    <button class="filter-chip" onclick="setFilter2('p0',this)">P0</button>
    <button class="filter-chip" onclick="setFilter2('p1',this)">P1</button>
    <button class="filter-chip" onclick="setFilter2('done',this)">Заполнены</button>
    <button class="filter-chip" onclick="setFilter2('empty',this)">Не заполнены</button>
  </div>

  <div class="add-section">
    <button class="add-toggle-btn" onclick="toggleAddForm()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Добавить нового бота
    </button>
    <div class="add-form-wrap" id="add-form">
      <div class="add-form-title">Новый бот</div>
      <div class="add-fields">
        <div class="add-field"><label>Название *</label><input type="text" id="new-name" placeholder="Название бота"></div>
        <div class="add-field"><label>Username</label><input type="text" id="new-username" placeholder="@username_murabot"></div>
        <div class="add-field"><label>Ответственный</label><input type="text" id="new-owner" placeholder="Имя сотрудника"></div>
        <div class="add-field"><label>Приоритет</label>
          <select id="new-priority"><option value="P0">P0 — критичный</option><option value="P1">P1 — важный</option></select>
        </div>
        <div class="add-field full"><label>Сфера / направление</label><input type="text" id="new-domain" placeholder="Например: Финансы / казначейство"></div>
      </div>
      <div class="add-actions">
        <button class="btn-cancel" onclick="toggleAddForm()">Отмена</button>
        <button class="btn-confirm" onclick="addBot()">Добавить</button>
      </div>
    </div>
  </div>

  <div class="bot-list" id="bot-list"></div>
</main>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg">Сохранено</span></div>

<script>
const BASE_QUESTIONS = [
  { key:'q1', label:'Для чего нужен ваш бот?' },
  { key:'q2', label:'Какую бизнес-цель он решает?' },
  { key:'q3', label:'Какую проблему (боль) сотрудников или компании закрывает?' },
  { key:'q4', label:'Кто является пользователем бота?' },
  { key:'q5', label:'Какой функционал должен быть реализован?' },
  { key:'q6', label:'Какие процессы будут автоматизированы или упрощены?' },
  { key:'q7', label:'Какой результат мы ожидаем получить после запуска?' },
  { key:'q8', label:'По какому критерию поймём, что бот работает успешно? (метрика успеха)' },
];

const COLORS = [
  { bg:'#E1F5EE', text:'#0F6E56' },
  { bg:'#FAECE7', text:'#993C1D' },
  { bg:'#FAEEDA', text:'#854F0B' },
  { bg:'#EEEDFE', text:'#3C3489' },
  { bg:'#E6F1FB', text:'#185FA5' },
  { bg:'#FBEAF0', text:'#993556' },
  { bg:'#F1EFE8', text:'#5F5E5A' },
];

const DEFAULT_BOTS = [
  { id:'b1',  name:'Баффет',       username:'@buffett_murabot',  owner:'Асем',          priority:'P0', domain:'Финансы / казначейство',         ci:0 },
  { id:'b2',  name:'Шерлок',       username:'@sherlok_murabot',  owner:'Асем',          priority:'P0', domain:'Финансы / контроль оплат',        ci:0 },
  { id:'b3',  name:'Рэмбо',        username:'@rambo_murabot',    owner:'Гриша',         priority:'P0', domain:'Строительство / ПТО',             ci:1 },
  { id:'b4',  name:'Муравей',      username:'@muravey_murabot',  owner:'Аида',          priority:'P0', domain:'Закупки и склад',                 ci:2 },
  { id:'b5',  name:'Ганди',        username:'@gandi_murabot',    owner:'Айгуль',        priority:'P1', domain:'HR / сообщество',                 ci:3 },
  { id:'b6',  name:'Оптимус',      username:'@optimus_murabot',  owner:'Меруерт',       priority:'P1', domain:'Задачи / управление',             ci:4 },
  { id:'b7',  name:'Форд',         username:'@ford_murabot',     owner:'Азамат',        priority:'P0', domain:'Механизмы',                       ci:1 },
  { id:'b8',  name:'Кронос',       username:'@cronos_murabot',   owner:'Айгуль',        priority:'P1', domain:'HR / учёт времени',               ci:3 },
  { id:'b9',  name:'Бэтмен',       username:'@batman_murabot',   owner:'Гриша',         priority:'P0', domain:'Тендеры / КП',                    ci:6 },
  { id:'b10', name:'Эталон (ОКК)', username:'уточнить',          owner:'Руслан',        priority:'P1', domain:'ОКК / Комфорт',                   ci:2 },
  { id:'b11', name:'Бот механик',  username:'@mehanic_murabot',  owner:'Закир / Павел', priority:'P0', domain:'Сервисный контур',                ci:6 },
  { id:'b12', name:'Робокоп',      username:'@robocop_murabot',  owner:'Меруерт',       priority:'P0', domain:'Строительство / подрядчики',      ci:1 },
  { id:'b13', name:'Мураграм',     username:'контент-канал',     owner:'Айгуль',        priority:'P1', domain:'Контент / портал',                ci:5 },
  { id:'b14', name:'Оракул',       username:'@oracle_murabot',   owner:'Меруерт',       priority:'P0', domain:'Строительство / ПТО',             ci:4 },
  { id:'b15', name:'Хранитель',    username:'@keeper_murabot',   owner:'Аида',          priority:'P0', domain:'Закупки и склад',                 ci:0 },
];

const KEY = 'atamura_v4';
let data = (() => { try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : null; } catch(e){} return null; })();
if (!data) data = { bots: DEFAULT_BOTS, answers: {}, customQ: {}, theme: 'white' };
if (!data.answers) data.answers = {};
if (!data.customQ) data.customQ = {};
if (!data.theme) data.theme = 'white';

function save() { try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e){} }

// Apply saved theme on load
setTheme(data.theme, null);

let currentFilter = 'all';

function setTheme(name, dotEl) {
  document.body.className = 'theme-' + name;
  data.theme = name;
  save();
  document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
  if (dotEl) dotEl.classList.add('active');
  else {
    const d = document.querySelector('.theme-dot-' + name);
    if (d) d.classList.add('active');
  }
}

function getAllQ(botId) {
  const custom = data.customQ[botId] || [];
  return [...BASE_QUESTIONS, ...custom];
}

function getStatus(id) {
  const all = getAllQ(id);
  const a = data.answers[id] || {};
  const n = all.filter(q => (a[q.key]||'').trim()).length;
  if (n === all.length && all.length > 0) return 'done';
  if (n > 0) return 'partial';
  return 'empty';
}
function getFilled(id) {
  const all = getAllQ(id);
  const a = data.answers[id] || {};
  return all.filter(q => (a[q.key]||'').trim()).length;
}

function updateStats() {
  const bots = data.bots;
  const total = bots.length;
  const done = bots.filter(b => getStatus(b.id)==='done').length;
  const partial = bots.filter(b => getStatus(b.id)==='partial').length;
  const empty = bots.filter(b => getStatus(b.id)==='empty').length;
  const p0 = bots.filter(b => b.priority==='P0').length;
  const p1 = bots.filter(b => b.priority==='P1').length;
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-partial').textContent = partial;
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = done + ' из ' + total + ' ботов заполнены';
  document.getElementById('cnt-all').textContent = total;
  document.getElementById('cnt-p0').textContent = p0;
  document.getElementById('cnt-p1').textContent = p1;
  document.getElementById('cnt-done').textContent = done;
  document.getElementById('cnt-partial').textContent = partial;
  document.getElementById('cnt-empty').textContent = empty;
}

function renderBots() {
  const q = (document.getElementById('search').value||'').toLowerCase();
  let bots = data.bots;
  if (currentFilter==='p0') bots = bots.filter(b=>b.priority==='P0');
  else if (currentFilter==='p1') bots = bots.filter(b=>b.priority==='P1');
  else if (currentFilter==='done') bots = bots.filter(b=>getStatus(b.id)==='done');
  else if (currentFilter==='partial') bots = bots.filter(b=>getStatus(b.id)==='partial');
  else if (currentFilter==='empty') bots = bots.filter(b=>getStatus(b.id)==='empty');
  if (q) bots = bots.filter(b=>b.name.toLowerCase().includes(q)||(b.owner||'').toLowerCase().includes(q)||(b.domain||'').toLowerCase().includes(q));

  const list = document.getElementById('bot-list');
  list.innerHTML = bots.map(bot => {
    const status = getStatus(bot.id);
    const filled = getFilled(bot.id);
    const allQ = getAllQ(bot.id);
    const pct = allQ.length ? Math.round((filled/allQ.length)*100) : 0;
    const c = COLORS[bot.ci!==undefined?bot.ci:0]||COLORS[0];
    const ans = data.answers[bot.id]||{};
    const statusBadge = status==='done'
      ? `<span class="badge badge-done">✓ Готов</span>`
      : status==='partial'
      ? `<span class="badge badge-partial">${filled}/${allQ.length}</span>`
      : `<span class="badge badge-empty">Не заполнен</span>`;

    const qItems = allQ.map((q, i) => {
      const isCustom = i >= BASE_QUESTIONS.length;
      return `
      <div class="q-item" id="qi-${bot.id}-${q.key}">
        <div class="q-top">
          <div class="q-label"><span class="q-num">${i+1}</span>${q.label}</div>
          ${isCustom ? `<button class="q-delete-btn" onclick="deleteCustomQ('${bot.id}','${q.key}')" title="Удалить вопрос">✕</button>` : ''}
        </div>
        <textarea class="q-input" id="${bot.id}-${q.key}" placeholder="Введите ответ..." rows="3">${ans[q.key]||''}</textarea>
      </div>`;
    }).join('');

    return `
    <div class="bot-card ${status}" id="card-${bot.id}">
      <div class="bot-header" onclick="toggleCard('${bot.id}')">
        <div class="bot-avatar" style="background:${c.bg};color:${c.text}">${bot.name.charAt(0)}</div>
        <div class="bot-info">
          <div class="bot-name">${bot.name}</div>
          <div class="bot-meta">${bot.username} · ${bot.owner} · ${bot.domain}</div>
        </div>
        <div class="bot-right">
          <span class="badge ${bot.priority==='P0'?'badge-p0':'badge-p1'}">${bot.priority}</span>
          ${statusBadge}
          <svg class="chevron" id="chev-${bot.id}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="prog-bar"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
      <div class="bot-body" id="body-${bot.id}">
        <div class="questions-grid" id="qgrid-${bot.id}">${qItems}</div>
        <div class="add-q-row">
          <input type="text" class="add-q-input" id="aq-${bot.id}" placeholder="+ Добавить свой вопрос или метрику...">
          <button class="add-q-btn" onclick="addCustomQ('${bot.id}')">Добавить</button>
        </div>
        <div class="bot-footer">
          <span class="save-hint">Данные сохраняются в браузере</span>
          <button class="save-btn" onclick="saveBotAnswers('${bot.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="20 6 9 17 4 12"/></svg>
            Сохранить
          </button>
        </div>
      </div>
    </div>`;
  }).join('');

  updateStats();
}

function toggleCard(id) {
  const body = document.getElementById('body-'+id);
  const chev = document.getElementById('chev-'+id);
  const isOpen = body.classList.contains('open');
  document.querySelectorAll('.bot-body').forEach(el=>el.classList.remove('open'));
  document.querySelectorAll('.chevron').forEach(el=>el.classList.remove('open'));
  if (!isOpen) { body.classList.add('open'); chev.classList.add('open'); }
}

function saveBotAnswers(id) {
  if (!data.answers[id]) data.answers[id]={};
  getAllQ(id).forEach(q => {
    const el = document.getElementById(id+'-'+q.key);
    if (el) data.answers[id][q.key] = el.value;
  });
  save();
  showToast('Ответы сохранены ✓');
  renderBots();
  setTimeout(()=>toggleCard(id), 60);
}

function addCustomQ(botId) {
  const inp = document.getElementById('aq-'+botId);
  const label = inp.value.trim();
  if (!label) { showToast('Введите текст вопроса'); return; }
  if (!data.customQ[botId]) data.customQ[botId]=[];
  const key = 'cq_'+Date.now();
  data.customQ[botId].push({ key, label });
  save();
  inp.value = '';
  showToast('Вопрос добавлен ✓');
  renderBots();
  setTimeout(()=>toggleCard(botId), 60);
}

function deleteCustomQ(botId, key) {
  if (!data.customQ[botId]) return;
  data.customQ[botId] = data.customQ[botId].filter(q=>q.key!==key);
  if (data.answers[botId]) delete data.answers[botId][key];
  save();
  showToast('Вопрос удалён');
  renderBots();
  setTimeout(()=>toggleCard(botId), 60);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.filter-chip').forEach(el=>el.classList.remove('active'));
  const chip = document.querySelector(`.filter-chip[onclick*="'${f}'"]`);
  if (chip) chip.classList.add('active');
  renderBots();
}

function setFilter2(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(el=>el.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.nav-item[data-filter]').forEach(el=>{
    el.classList.toggle('active', el.dataset.filter===f);
  });
  renderBots();
}

function toggleAddForm() {
  document.getElementById('add-form').classList.toggle('open');
}

function addBot() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { showToast('Введите название бота'); return; }
  data.bots.push({
    id: 'c_'+Date.now(), name,
    username: document.getElementById('new-username').value.trim()||'—',
    owner: document.getElementById('new-owner').value.trim()||'—',
    priority: document.getElementById('new-priority').value,
    domain: document.getElementById('new-domain').value.trim()||'—',
    ci: Math.floor(Math.random()*COLORS.length)
  });
  save();
  ['new-name','new-username','new-owner','new-domain'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('add-form').classList.remove('open');
  renderBots();
  showToast('Бот добавлен ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function exportReport() {
  const lines = ['ATAMURA — Отчёт по чеклисту ботов', '='.repeat(50), ''];
  data.bots.forEach(bot => {
    const ans = data.answers[bot.id]||{};
    const allQ = getAllQ(bot.id);
    const filled = getFilled(bot.id);
    lines.push(`БОТ: ${bot.name} (${bot.username})`);
    lines.push(`Ответственный: ${bot.owner} | Приоритет: ${bot.priority} | Заполнено: ${filled}/${allQ.length}`);
    lines.push('-'.repeat(40));
    allQ.forEach((q,i) => {
      lines.push(`${i+1}. ${q.label}`);
      lines.push(`   ${(ans[q.key]||'').trim()||'[не заполнено]'}`);
    });
    lines.push('');
  });
  const blob = new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'atamura_checklist_report.txt';
  a.click();
  showToast('Отчёт скачан ✓');
}

renderBots();
</script>
</body>
</html>
